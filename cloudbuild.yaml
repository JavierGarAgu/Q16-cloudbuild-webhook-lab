options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: "europe-west1"
  _REPOSITORY: "trusted-images"
  _IMAGE: "webapp"
  _CLUSTER: "binaryauth-cluster-v2"
  _ZONE: "europe-west1-b"

steps:

#######################################################
# BUILD IMAGE
#######################################################

- id: Build
  name: gcr.io/cloud-builders/docker
  args:
    - build
    - "-t"
    - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$SHORT_SHA"
    - "."

#######################################################
# PUSH IMAGE
#######################################################

- id: Push
  name: gcr.io/cloud-builders/docker
  waitFor:
    - Build
  args:
    - push
    - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$SHORT_SHA"

#######################################################
# CREATE BINARY AUTHORIZATION ATTESTATION
#######################################################

- id: Sign Image
  name: gcr.io/google.com/cloudsdktool/cloud-sdk
  waitFor:
    - Push
  entrypoint: bash
  args:
    - -c
    - |
      gcloud alpha container binauthz attestations sign-and-create \
        --artifact-url=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$SHORT_SHA \
        --attestor=projects/$PROJECT_ID/attestors/trusted-cloudbuild-v2 \
        --keyversion-project=$PROJECT_ID \
        --keyversion-location=global \
        --keyversion-keyring=binaryauth-keyring-v2 \
        --keyversion-key=binaryauth-key-v2 \
        --keyversion=1

#######################################################
# GET GKE CREDENTIALS
#######################################################

- id: Get Credentials
  name: gcr.io/google.com/cloudsdktool/cloud-sdk
  waitFor:
    - Sign Image
  entrypoint: gcloud
  args:
    - container
    - clusters
    - get-credentials
    - "${_CLUSTER}"
    - "--zone=${_ZONE}"
    - "--project=$PROJECT_ID"

#######################################################
# UPDATE DEPLOYMENT MANIFEST
#######################################################

- id: Update Manifest
  name: ubuntu
  waitFor:
    - Get Credentials
  entrypoint: bash
  args:
    - -c
    - |
      sed -i "s|IMAGE_PLACEHOLDER|${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$SHORT_SHA|g" k8s/deployment.yaml

#######################################################
# DEPLOY TO GKE
#######################################################

- id: Deploy
  name: gcr.io/cloud-builders/kubectl
  waitFor:
    - Update Manifest
  env:
    - CLOUDSDK_COMPUTE_ZONE=${_ZONE}
    - CLOUDSDK_CONTAINER_CLUSTER=${_CLUSTER}
  args:
    - apply
    - -f
    - k8s/

#######################################################
# OUTPUT IMAGE
#######################################################

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$SHORT_SHA"
