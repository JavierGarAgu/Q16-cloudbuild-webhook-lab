apiVersion: apps/v1
kind: Deployment

metadata:
  name: webapp
  namespace: production

spec:
  replicas: 2

  selector:
    matchLabels:
      app: webapp

  template:

    metadata:

      labels:
        app: webapp

    spec:

      containers:

      - name: webapp

        image: IMAGE_PLACEHOLDER

        imagePullPolicy: Always

        ports:

        - containerPort: 8080

        readinessProbe:

          httpGet:

            path: /health

            port: 8080

          initialDelaySeconds: 5

          periodSeconds: 5

        livenessProbe:

          httpGet:

            path: /health

            port: 8080

          initialDelaySeconds: 10

          periodSeconds: 10
